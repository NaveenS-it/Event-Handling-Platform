<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - EventSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <header class="header">
        <div class="container navbar">
            <a href="../../index.html" class="brand">EventSphere</a>
        </div>
    </header>

    <main class="container auth-container">
        <div class="glass-card" style="width: 100%; max-width: 500px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2>Secure Checkout</h2>
                <p style="color: var(--gray);">Complete your booking payment</p>
            </div>

            <div id="checkoutSummary"
                style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 30px;">
                <!-- Summary injected here -->
            </div>

            <form id="paymentForm">
                <div class="form-group" style="text-align: left;">
                    <label>Cardholder Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required
                        style="width:100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color:white;">
                </div>

                <div class="form-group" style="text-align: left;">
                    <label>Card Number</label>
                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required maxlength="19"
                        style="width:100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color:white;">
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1; text-align: left;">
                        <label>Expiry (MM/YY)</label>
                        <input type="text" class="form-control" placeholder="12/25" required
                            style="width:100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color:white;">
                    </div>
                    <div class="form-group" style="flex: 1; text-align: left;">
                        <label>CVC</label>
                        <input type="text" class="form-control" placeholder="123" required maxlength="3"
                            style="width:100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color:white;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="payBtn"
                    style="width: 100%; padding: 16px; font-size: 18px; margin-top: 10px;">
                    Pay & Confirm Booking
                </button>
            </form>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingData = JSON.parse(sessionStorage.getItem('booking_tickets'));
            if (!bookingData) {
                window.location.href = 'events.html';
                return;
            }

            document.getElementById('checkoutSummary').innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>Event ID:</span>
                    <strong>${bookingData.event_id}</strong>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>Tickets selected:</span>
                    <strong>${bookingData.tickets.reduce((a, b) => a + b.quantity, 0)}</strong>
                </div>
            `;

            document.getElementById('paymentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('payBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                btn.disabled = true;

                try {
                    // Make booking API call
                    const res = await API.post('/bookings/book', bookingData);

                    showToast('Payment successful! Redirecting to dashboard...');
                    sessionStorage.removeItem('booking_tickets');

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } catch (err) {
                    showToast(err.message, 'error');
                    btn.innerHTML = 'Pay & Confirm Booking';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
