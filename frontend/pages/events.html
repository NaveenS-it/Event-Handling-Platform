<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Events - EventSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/events.css">
</head>

<body>

    <header class="header">
        <div class="container navbar">
            <a href="../../index.html" class="brand">EventSphere</a>
            <div class="nav-links" id="navLinks">
                <a href="events.html" style="color: var(--primary);">Browse Events</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 40px 20px;">
        <h1 style="margin-bottom: 20px;">Explore Events</h1>

        <div class="filters-bar">
            <input type="text" id="searchInput" class="filter-input" placeholder="Search events by name...">
            <select id="categoryFilter" class="filter-input" style="background-color: var(--dark);">
                <option value="">All Categories</option>
                <option value="1">Music</option>
                <option value="2">Technology</option>
                <option value="3">Business</option>
                <option value="4">Arts</option>
            </select>
            <button class="btn btn-primary" onclick="loadEvents()"><i class="fas fa-search"></i> Search</button>
        </div>

        <div class="events-grid" id="eventsContainer">
            <!-- Loader -->
            <p>Loading events...</p>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/api.js"></script>
    <script src="../js/events.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('navLinks').innerHTML = `
                    <a href="events.html" style="color: var(--primary);">Browse Events</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="#" onclick="localStorage.clear(); window.location.href='../../index.html'" class="btn btn-outline">Logout</a>
                `;
            }
            loadEvents();
        });
    </script>
</body>

</html>
