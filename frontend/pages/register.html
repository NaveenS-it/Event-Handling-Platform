<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EventSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <header class="header">
        <div class="container navbar">
            <a href="../../index.html" class="brand">EventSphere</a>
        </div>
    </header>

    <main class="container auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join EventSphere to book and create events</p>
            </div>

            <form id="registerForm">
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-control" required placeholder="John">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-control" required placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••"
                        minlength="6">
                </div>

                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role" class="form-control" style="background-color: var(--dark);">
                        <option value="user">Regular User (Attendee)</option>
                        <option value="organizer">Event Organizer</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary auth-btn" id="regBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
