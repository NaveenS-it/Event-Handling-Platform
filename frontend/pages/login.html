<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <header class="header">
        <div class="container navbar">
            <a href="../../index.html" class="brand">EventSphere</a>
        </div>
    </header>

    <main class="container auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to manage your events and tickets</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
